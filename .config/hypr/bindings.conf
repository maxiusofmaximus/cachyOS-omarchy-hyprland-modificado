# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Windows-like window management
# Unbind default arrow key bindings (movefocus) and workspace tab cycling
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB

# Super+Left/Right — snap a mitad de pantalla (como Windows Snap)
bindd = SUPER, LEFT,  Snap left,  exec, hypr-snap left
bindd = SUPER, RIGHT, Snap right, exec, hypr-snap right

# Super+Up — maximizar (sale de snap/float primero si es necesario)
bindd = SUPER, UP, Maximize, exec, hypr-snap up

# Super+Down — minimizar
bindd = SUPER, DOWN, Minimize, exec, hypr-snap down

# Super+Shift+Down — restaurar última ventana minimizada directamente
bindd = SUPER SHIFT, DOWN, Restore minimized, exec, hypr-snap restore

# FancyZones / Snap Layouts (zonas definidas en ~/.config/hypr/fancyzones.json)
# Super+Ctrl+1..6 = snap a la zona N del layout actual; Super+Ctrl+Tab = cambiar layout
bindd = SUPER CTRL, 1, Zone 1, exec, hypr-fancyzones snap 1
bindd = SUPER CTRL, 2, Zone 2, exec, hypr-fancyzones snap 2
bindd = SUPER CTRL, 3, Zone 3, exec, hypr-fancyzones snap 3
bindd = SUPER CTRL, 4, Zone 4, exec, hypr-fancyzones snap 4
bindd = SUPER CTRL, 5, Zone 5, exec, hypr-fancyzones snap 5
bindd = SUPER CTRL, 6, Zone 6, exec, hypr-fancyzones snap 6
bindd = SUPER CTRL, TAB, Cycle zone layout, exec, hypr-fancyzones cycle

# Super+Tab — Task View (miniaturas de ventanas, como Windows)
bindd = SUPER, TAB,       Task view,        exec, uwsm-app -- hypr-taskview
# Super+Shift+Tab — lista de ventanas (texto, búsqueda rápida)
bindd = SUPER SHIFT, TAB, Window list,      exec, hypr-window-list

# Alt+Tab — overlay GTK4 propio servido por el daemon residente hypr-alttabd
# (apertura instantánea, sin arranque en frío). El overlay detecta Alt release
# internamente (keyboard EXCLUSIVE); el bindr es respaldo.
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
bindd = ALT, TAB,       Alt+Tab,       exec, hypr-alttab
bindd = ALT SHIFT, TAB, Alt+Shift+Tab, exec, hypr-alttab prev
bindr = ALT, Alt_L, exec, hypr-alttab close

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Screenshot
bindd = SUPER SHIFT, S, Screenshot region, exec, hypr-screenshot

# Smart Ctrl+C: copia si hay texto seleccionado, SIGINT si no
bind = CTRL, C, exec, hypr-clip-copy

# Smart Ctrl+V: texto normal en cualquier app, imagen → ruta en terminales
bind = CTRL, V, exec, hypr-clip-paste

# Win+V: historial de portapapeles (cliphist + wofi). Requiere: omarchy pkg add cliphist
bind = SUPER, V, exec, hypr-clip-history

# Submap de passthrough para que ydotool pueda inyectar Ctrl+C/V sin re-triggear los bindings.
# Hyprland NO registra submaps vacíos — necesita al menos una bind para existir.
# Escape como válvula de seguridad por si el script falla sin hacer reset.
submap = clipboard-passthrough
bind = , escape, submap, reset
submap = reset

# Clic derecho/central: nativos. La copia/pega en terminal se maneja en
# la config de Alacritty (copiar-al-seleccionar + clic derecho = pegar).

