# Extra autostart processes
# exec-once = uwsm-app -- my-service

# ydotoold: demonio de inyección de teclas (necesario para el portapapeles smart)
exec-once = ydotoold

# Historial de portapapeles (Win+V): el watcher guarda cada copia en cliphist.
# Requiere: omarchy pkg add cliphist  (si no está, esto falla en silencio)
exec-once = wl-paste --watch cliphist store

# Daemon residente del Alt+Tab (overlay instantáneo, sin arranque en frío).
# LD_PRELOAD: gtk4-layer-shell debe cargarse antes que libwayland-client.
exec-once = env LD_PRELOAD=/usr/lib/libgtk4-layer-shell.so hypr-alttabd

# hyprswitch ya no se usa: reemplazado por el overlay propio (hypr-alttabd).
# exec-once = hyprswitch init --show-title --size-factor 6 --custom-css ~/.config/hyprswitch/style.css
